<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bandeja · Michelle — Dr. Miguel Soto</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --negro:#030707;
    --taupe:#A19487;
    --crema:#F4F2F1;
    --linea:#E4DFDA;
    --taupe-suave:#EFEAE5;
    --ok:#2f7d5b;
    --alerta:#b4562f;
    --sombra:0 8px 30px rgba(3,7,7,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Jost',sans-serif;
    color:var(--negro);
    background:var(--crema);
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  .titulo{font-family:'Cormorant Garamond',serif;letter-spacing:.3px}
  .oculto{display:none !important}

  /* ---------- Monograma ---------- */
  .mono{
    width:40px;height:40px;border:1.5px solid var(--negro);
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-weight:600;font-size:19px;
    letter-spacing:1px;flex:0 0 auto;
  }

  /* ---------- LOGIN ---------- */
  #login{
    height:100%;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .login-card{
    background:#fff;border:1px solid var(--linea);box-shadow:var(--sombra);
    max-width:380px;width:100%;padding:44px 34px;text-align:center;
  }
  .login-card .mono{margin:0 auto 22px}
  .login-card h1{font-size:30px;font-weight:600;margin-bottom:6px}
  .login-card .sub{color:var(--taupe);font-size:14px;letter-spacing:.4px;margin-bottom:30px}
  #gbtn{display:flex;justify-content:center;min-height:44px}
  #login-msg{margin-top:18px;font-size:13px;min-height:18px}
  #login-msg.err{color:var(--alerta)}
  .cargando{color:var(--taupe);font-size:13px;letter-spacing:.5px}

  /* ---------- APP ---------- */
  #app{height:100%;display:flex;flex-direction:column}
  header{
    display:flex;align-items:center;gap:14px;
    padding:12px 20px;background:#fff;border-bottom:1px solid var(--linea);
    flex:0 0 auto;
  }
  header .brand{display:flex;align-items:center;gap:12px}
  header .brand .mono{width:34px;height:34px;font-size:16px}
  header h2{font-size:20px;font-weight:600}
  header .quien{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--taupe)}
  header .quien img{width:28px;height:28px;border-radius:50%;border:1px solid var(--linea)}
  .btn-salir{
    background:none;border:1px solid var(--linea);color:var(--negro);
    font-family:inherit;font-size:12px;letter-spacing:.5px;padding:6px 12px;
    cursor:pointer;text-transform:uppercase;
  }
  .btn-salir:hover{background:var(--crema)}

  .cuerpo{flex:1 1 auto;display:flex;min-height:0}

  /* Lista */
  .lista{
    width:340px;flex:0 0 auto;border-right:1px solid var(--linea);
    background:#fff;overflow-y:auto;
  }
  .lista .titulo-col{
    padding:14px 18px 10px;font-size:12px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--taupe);
    position:sticky;top:0;background:#fff;border-bottom:1px solid var(--linea);
  }
  .conv{
    padding:14px 18px;border-bottom:1px solid var(--linea);cursor:pointer;
    display:flex;flex-direction:column;gap:3px;position:relative;
  }
  .conv:hover{background:var(--crema)}
  .conv.activa{background:var(--taupe-suave)}
  .conv .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .conv .nombre{font-weight:500;font-size:15px}
  .conv .hora{font-size:11px;color:var(--taupe);flex:0 0 auto}
  .conv .prev{font-size:13px;color:#6b6259;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .conv .fila2{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:2px}
  .badge{
    font-size:10px;letter-spacing:.6px;text-transform:uppercase;
    padding:2px 8px;border:1px solid var(--linea);color:var(--taupe);
  }
  .badge.humano{border-color:var(--alerta);color:var(--alerta)}
  .badge.michelle{border-color:var(--taupe);color:var(--taupe)}
  .no-leidos{
    background:var(--negro);color:#fff;font-size:11px;min-width:20px;height:20px;
    border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 6px;
  }
  .vacio-lista{padding:30px 18px;color:var(--taupe);font-size:13px;text-align:center}

  /* Hilo */
  .hilo{flex:1 1 auto;display:flex;flex-direction:column;min-width:0;background:var(--crema)}
  .hilo-head{
    padding:14px 22px;background:#fff;border-bottom:1px solid var(--linea);
    display:flex;align-items:center;gap:12px;flex:0 0 auto;
  }
  .hilo-head .nombre{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600}
  .hilo-head .tel{font-size:12px;color:var(--taupe)}
  .btn-devolver{
    background:var(--negro);color:#fff;border:none;
    font-family:inherit;font-size:12px;letter-spacing:.6px;text-transform:uppercase;
    padding:9px 16px;cursor:pointer;
  }
  .btn-idioma{
    margin-left:auto;background:none;border:1px solid var(--linea);color:var(--taupe);
    font-family:inherit;font-size:11px;letter-spacing:.5px;text-transform:uppercase;
    padding:8px 12px;cursor:pointer;
  }
  .btn-idioma:hover{background:var(--crema);color:var(--negro)}
  .btn-devolver:hover{background:#1a1f1f}
  .btn-devolver:disabled{opacity:.4;cursor:default}

  .mensajes{flex:1 1 auto;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:74%;padding:10px 14px;font-size:14px;line-height:1.5;position:relative;word-wrap:break-word}
  .msg .meta{font-size:10px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;opacity:.7}
  .msg.paciente{align-self:flex-start;background:#fff;border:1px solid var(--linea)}
  .msg.michelle{align-self:flex-end;background:var(--taupe-suave);border:1px solid var(--linea)}
  .msg.michelle .meta{color:var(--taupe)}
  .msg.agente{align-self:flex-end;background:var(--negro);color:#fff}
  .msg.agente .meta{color:rgba(255,255,255,.7)}
  .hilo-vacio{flex:1;display:flex;align-items:center;justify-content:center;color:var(--taupe);font-size:14px;text-align:center;padding:24px}

  .responder{
    flex:0 0 auto;border-top:1px solid var(--linea);background:#fff;
    padding:14px 18px;display:flex;gap:10px;align-items:flex-end;
  }
  .responder textarea{
    flex:1;resize:none;border:1px solid var(--linea);font-family:inherit;font-size:14px;
    padding:10px 12px;min-height:44px;max-height:140px;background:var(--crema);color:var(--negro);
  }
  .responder textarea:focus{outline:none;border-color:var(--taupe)}
  .btn-enviar{
    background:var(--taupe);color:#fff;border:none;font-family:inherit;
    font-size:13px;letter-spacing:.6px;text-transform:uppercase;padding:0 20px;height:44px;cursor:pointer;
  }
  .btn-enviar:hover{background:#8f8377}
  .btn-enviar:disabled{opacity:.4;cursor:default}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--negro);color:#fff;padding:10px 18px;font-size:13px;
    box-shadow:var(--sombra);z-index:50;opacity:0;transition:opacity .2s;pointer-events:none;
  }
  .toast.ver{opacity:1}

  /* Móvil */
  @media (max-width:760px){
    .lista{width:100%}
    .lista.tiene-activa{display:none}
    .hilo{display:none}
    .hilo.abierto{display:flex;position:fixed;inset:0;z-index:20}
    .hilo-head .volver{display:inline-flex}
  }
  .volver{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--negro);padding:0 4px 0 0}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="login-card">
    <div class="mono titulo">MS</div>
    <h1 class="titulo">Bandeja Michelle</h1>
    <div class="sub">Atención de pacientes · acceso del equipo</div>
    <div id="gbtn"></div>
    <div id="login-msg" class="cargando">Preparando acceso…</div>
    <div style="margin-top:22px;font-size:11px;letter-spacing:1px;color:var(--taupe);opacity:.7">v5 · FedCM · ES</div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app" class="oculto">
  <header>
    <div class="brand">
      <div class="mono titulo">MS</div>
      <h2 class="titulo">Bandeja Michelle</h2>
    </div>
    <div class="quien">
      <img id="u-foto" alt="" />
      <span id="u-mail"></span>
      <button class="btn-salir" onclick="salir()">Salir</button>
    </div>
  </header>

  <div class="cuerpo">
    <aside class="lista" id="lista">
      <div class="titulo-col">Conversaciones</div>
      <div id="lista-items"></div>
    </aside>

    <section class="hilo" id="hilo">
      <div class="hilo-vacio" id="hilo-vacio">Selecciona una conversación para atenderla.</div>

      <div id="hilo-activo" class="oculto" style="display:flex;flex-direction:column;flex:1;min-height:0">
        <div class="hilo-head">
          <button class="volver" onclick="cerrarHiloMovil()">‹</button>
          <div>
            <div class="nombre titulo" id="h-nombre"></div>
            <div class="tel" id="h-tel"></div>
          </div>
          <button class="btn-idioma" id="btn-idioma" onclick="toggleIdioma()">Ver original</button>
          <button class="btn-devolver" id="btn-devolver" onclick="devolver()">Devolver a Michelle</button>
        </div>
        <div class="mensajes" id="mensajes"></div>
        <div class="responder">
          <textarea id="txt" placeholder="Escribe tu respuesta…" oninput="autoAlto(this)" onkeydown="teclaEnviar(event)"></textarea>
          <button class="btn-enviar" id="btn-enviar" onclick="responder()">Enviar</button>
        </div>
      </div>
    </section>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const API = "https://chatbot-whatsapp-production-9bc5.up.railway.app";
// Respaldo por si /inbox/config no responde:
const CLIENT_ID_FALLBACK = "634352012698-b47t3ed3tvd4d1g7l30l68bd6e5s0ri4.apps.googleusercontent.com";

let ID_TOKEN = null;      // JWT de Google (se manda como Bearer)
let CLIENT_ID = null;
let activo = null;        // teléfono de la conversación abierta
let tConvs = null, tHilo = null, tRefresh = null;
let reautenticando = false;
let fallosAuthSeguidos = 0;   // corta el polling si no logramos renovar

/* ============================================================
   ARRANQUE — obtener client_id y montar GIS con FedCM
   ============================================================ */
window.addEventListener("load", init);

async function init(){
  try{
    const r = await fetch(API + "/inbox/config");
    if(r.ok){ const c = await r.json(); CLIENT_ID = c.google_client_id || c.clientId || c.client_id || c.CLIENT_ID; }
  }catch(e){ /* usamos respaldo */ }
  CLIENT_ID = CLIENT_ID || CLIENT_ID_FALLBACK;
  esperarGIS();
}

function esperarGIS(){
  if(!(window.google && google.accounts && google.accounts.id)){
    return setTimeout(esperarGIS, 120);
  }
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: onCredential,
    auto_select: true,          // reingreso silencioso al recargar
    cancel_on_tap_outside: false,
    use_fedcm_for_prompt: true, // FedCM: sin popup, sin COOP
    itp_support: true           // compatibilidad Safari
  });
  google.accounts.id.renderButton(
    document.getElementById("gbtn"),
    { theme:"outline", size:"large", type:"standard", text:"signin_with",
      shape:"pill", logo_alignment:"center", width:300 }
  );
  google.accounts.id.prompt(); // intenta One Tap / FedCM
  setMsg("Inicia sesión con tu cuenta del equipo.", false);
}

/* Google nos entrega el ID token aquí (login inicial Y cada refresco) */
function onCredential(resp){
  if(!resp || !resp.credential){ setMsg("No se recibió la credencial. Intenta de nuevo.", true); return; }
  ID_TOKEN = resp.credential;
  reautenticando = false;
  fallosAuthSeguidos = 0;
  const p = decodeJWT(ID_TOKEN) || {};
  document.getElementById("u-mail").textContent = p.email || "";
  const foto = document.getElementById("u-foto");
  if(p.picture){ foto.src = p.picture; foto.style.display = ""; } else { foto.style.display = "none"; }
  programarRefresco();   // renueva el token ANTES de que venza
  entrar();
}

function entrar(){
  document.getElementById("login").classList.add("oculto");
  document.getElementById("app").classList.remove("oculto");
  detenerPolling();                 // evita apilar timers en cada re-login
  cargarConversaciones();
  tConvs = setInterval(cargarConversaciones, 10000);
  if(activo){                       // si había un hilo abierto, reanuda su polling
    cargarHilo();
    tHilo = setInterval(cargarHilo, 5000);
  }
}

function detenerPolling(){
  clearInterval(tConvs); tConvs = null;
  clearInterval(tHilo);  tHilo  = null;
}

function salir(){
  try{ google.accounts.id.disableAutoSelect(); }catch(e){}
  ID_TOKEN = null; activo = null;
  detenerPolling(); clearTimeout(tRefresh);
  location.reload();
}

/* ============================================================
   SESIÓN — validez del token y renovación proactiva
   ============================================================ */
function tokenExpMs(){
  const p = decodeJWT(ID_TOKEN);
  return (p && p.exp) ? p.exp * 1000 : 0;
}
// Token bueno si existe y le quedan más de 60s de vida.
function tokenValido(){
  return !!ID_TOKEN && Date.now() < (tokenExpMs() - 60000);
}

// Pide a Google una credencial fresca, con candado para no spamear el prompt.
function pedirReauth(){
  if(reautenticando) return;
  reautenticando = true;
  try{ google.accounts.id.prompt(); }catch(e){}
  // Si en 8s no llegó credencial nueva, soltamos el candado para poder reintentar.
  setTimeout(()=>{ reautenticando = false; }, 8000);
}

// Programa la renovación ~2 min antes de que el token venza.
function programarRefresco(){
  clearTimeout(tRefresh);
  const ms = tokenExpMs() - Date.now() - 120000;
  if(ms > 0) tRefresh = setTimeout(pedirReauth, ms);
  else pedirReauth();
}

/* ============================================================
   FETCH protegido — NUNCA manda una petición con token vencido/nulo
   ============================================================ */
async function api(path, opts={}){
  // Candado central: sin token válido no golpeamos al servidor.
  if(!tokenValido()){
    detenerPolling();     // dejamos de martillar mientras renovamos
    pedirReauth();
    throw new Error("auth");
  }
  const headers = Object.assign({ "Authorization":"Bearer "+ID_TOKEN }, opts.headers||{});
  const r = await fetch(API + path, Object.assign({ cache:"no-store" }, opts, { headers }));
  if(r.status === 401 || r.status === 403){
    sesionCaida(r.status);
    throw new Error("auth");
  }
  if(r.status === 304) return null;           // sin cambios: no rompemos
  if(!r.ok) throw new Error("HTTP "+r.status);
  const ct = r.headers.get("content-type")||"";
  return ct.includes("application/json") ? r.json() : r.text();
}

function sesionCaida(code){
  detenerPolling();
  ID_TOKEN = null;
  fallosAuthSeguidos++;
  if(code === 403){
    // Correo no autorizado: no tiene caso reintentar en bucle.
    document.getElementById("app").classList.add("oculto");
    document.getElementById("login").classList.remove("oculto");
    setMsg("Tu correo no está autorizado en la bandeja.", true);
    return;
  }
  // 401: token vencido/ inválido. Intentamos renovar en silencio hasta 3 veces;
  // si no se logra, mostramos login y esperamos acción del usuario (sin flood).
  if(fallosAuthSeguidos <= 3){
    pedirReauth();
  }else{
    document.getElementById("app").classList.add("oculto");
    document.getElementById("login").classList.remove("oculto");
    setMsg("La sesión expiró. Vuelve a entrar.", true);
  }
}

/* ============================================================
   CONVERSACIONES
   ============================================================ */
async function cargarConversaciones(){
  try{
    const data = await api("/inbox/conversaciones");
    if(data === null) return;                  // 304: nada que repintar
    const arr = Array.isArray(data) ? data : (data.conversaciones || data.items || []);
    pintarConversaciones(arr);
  }catch(e){ if(e.message!=="auth") console.warn(e); }
}

function pintarConversaciones(arr){
  const cont = document.getElementById("lista-items");
  if(!arr.length){ cont.innerHTML = '<div class="vacio-lista">Sin conversaciones por ahora.</div>'; return; }
  cont.innerHTML = "";
  arr.forEach(c=>{
    const tel   = c.telefono || c.phone || c.id || "";
    const nom   = c.nombre || c.name || c.perfil || tel;
    const prev  = c.ultimo || c.ultimoMensaje || c.preview || c.ultimoTexto || campoTexto(c.ultimoMensajeObj||{}) || "";
    const estado= (c.estado || c.status || "").toLowerCase();
    const noL   = c.noLeidos ?? c.unread ?? 0;
    const hora  = fmtHora(c.ts || c.fecha || c.timestamp || c.updatedAt);

    const esHumano = /human|pausa|agente|espera/.test(estado);
    const div = document.createElement("div");
    div.className = "conv" + (tel===activo ? " activa" : "");
    div.onclick = ()=>abrirHilo(tel, nom);

    const badge = esHumano
      ? '<span class="badge humano">En espera</span>'
      : '<span class="badge michelle">Michelle</span>';
    const cntL = noL>0 ? '<span class="no-leidos">'+noL+'</span>' : '<span></span>';

    div.innerHTML =
      '<div class="top"><span class="nombre"></span><span class="hora">'+hora+'</span></div>'+
      '<div class="prev"></div>'+
      '<div class="fila2">'+badge+cntL+'</div>';
    div.querySelector(".nombre").textContent = nom;
    div.querySelector(".prev").textContent = prev;
    cont.appendChild(div);
  });
}

/* ============================================================
   HILO
   ============================================================ */
async function abrirHilo(tel, nom){
  activo = tel;
  document.getElementById("hilo-vacio").classList.add("oculto");
  document.getElementById("hilo-activo").classList.remove("oculto");
  document.getElementById("h-nombre").textContent = nom || tel;
  document.getElementById("h-tel").textContent = tel;
  document.getElementById("lista").classList.add("tiene-activa");
  document.getElementById("hilo").classList.add("abierto");
  document.querySelectorAll(".conv").forEach(x=>x.classList.remove("activa"));
  await cargarHilo();
  clearInterval(tHilo);
  tHilo = setInterval(cargarHilo, 5000);
  cargarConversaciones();
}

async function cargarHilo(){
  if(!activo) return;
  try{
    const data = await api("/inbox/hilo/" + encodeURIComponent(activo));
    if(data === null) return;                  // 304: sin cambios
    const msgs = Array.isArray(data) ? data : (data.mensajes || data.messages || []);
    pintarMensajes(msgs);
  }catch(e){ if(e.message!=="auth") console.warn(e); }
}

const cacheTrad = new Map();   // texto original -> español
let verOriginal = false;       // toggle global de la bandeja

function pintarMensajes(msgs){
  const cont = document.getElementById("mensajes");
  const abajo = cont.scrollHeight - cont.scrollTop - cont.clientHeight < 60;
  cont.innerHTML = "";
  const originales = [];
  msgs.forEach(m=>{
    const rolRaw = (m.rol || m.role || m.from || "").toLowerCase();
    let clase = "paciente", etiqueta = "Paciente";
    if(/michelle|bot|ai|assistant/.test(rolRaw)){ clase="michelle"; etiqueta="Michelle"; }
    else if(/agente|agent|equipo|team|human/.test(rolRaw)){ clase="agente"; etiqueta="Equipo"; }
    const orig = campoTexto(m);
    if(orig) originales.push(orig);
    const es = cacheTrad.get(orig);
    const traducido = !!es && es.trim() !== orig.trim();
    const mostrado = verOriginal ? orig : (es || orig);
    const hora  = fmtHora(m.ts || m.fecha || m.timestamp || m.createdAt);

    const div = document.createElement("div");
    div.className = "msg " + clase;
    const meta = document.createElement("div"); meta.className="meta";
    meta.textContent = etiqueta + (hora?" · "+hora:"") + (traducido && !verOriginal ? " · traducido" : "");
    const cuerpo = document.createElement("div"); cuerpo.textContent = mostrado;
    div.appendChild(meta); div.appendChild(cuerpo);
    cont.appendChild(div);
  });
  if(abajo) cont.scrollTop = cont.scrollHeight;

  // Traduce en segundo plano lo que falte y repinta una vez
  traducirPendientes(originales).then(cambio=>{ if(cambio) pintarMensajes(msgs); });
}

async function traducirPendientes(textos){
  // Solo traducimos lo que NO está ya en español y aún no tenemos.
  const faltan = [...new Set(textos.filter(t=> t && !cacheTrad.has(t) && !pareceEspanol(t)))];
  // Los que ya están en español los damos por "traducidos" (a sí mismos), para no repreguntar.
  textos.forEach(t=>{ if(t && !cacheTrad.has(t) && pareceEspanol(t)) cacheTrad.set(t, t); });
  if(!faltan.length) return false;
  try{
    const r = await api("/inbox/traducir", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ textos: faltan })
    });
    const trad = r && r.traducciones;
    if(Array.isArray(trad) && trad.length===faltan.length){
      faltan.forEach((t,i)=>{
        const val = (trad[i] && String(trad[i]).trim()) ? String(trad[i]) : t; // nunca vacío
        cacheTrad.set(t, val);
      });
      return true;
    }
  }catch(e){ /* silencioso: si falla se queda el original */ }
  return false;
}

// Heurística ligera: ¿el texto ya viene en español? (evita traducir y evita el "¿?")
function pareceEspanol(t){
  const s = (t||"").toLowerCase();
  if(!s.trim()) return true;
  if(/[áéíóúñ¿¡]/.test(s)) return true;
  return /\b(hola|precio|cita|gracias|quiero|cuánto|cuanto|dame|buenas|buenos|por favor|información|informacion|agendar|valoración|valoracion|cuello|cara|rostro|de|el|la|los|las|una|para|con|qué|que|cómo|como)\b/.test(s);
}

function toggleIdioma(){
  verOriginal = !verOriginal;
  const b = document.getElementById("btn-idioma");
  if(b) b.textContent = verOriginal ? "Ver traducción" : "Ver original";
  if(activo) cargarHilo();
}

async function responder(){
  const ta = document.getElementById("txt");
  const texto = ta.value.trim();
  if(!texto || !activo) return;
  const btn = document.getElementById("btn-enviar");
  btn.disabled = true;
  try{
    await api("/inbox/responder", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ telefono: activo, texto })
    });
    ta.value=""; autoAlto(ta);
    await cargarHilo();
    cargarConversaciones();
  }catch(e){
    if(e.message!=="auth") toast("No se pudo enviar. Intenta de nuevo.");
  }finally{ btn.disabled = false; }
}

async function devolver(){
  if(!activo) return;
  if(!confirm("¿Devolver esta conversación a Michelle?")) return;
  const btn = document.getElementById("btn-devolver");
  btn.disabled = true;
  try{
    await api("/inbox/devolver", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ telefono: activo })
    });
    toast("Control devuelto a Michelle.");
    await cargarHilo();
    cargarConversaciones();
  }catch(e){
    if(e.message!=="auth") toast("No se pudo devolver el control.");
  }finally{ btn.disabled = false; }
}

/* ============================================================
   UI helpers
   ============================================================ */
function cerrarHiloMovil(){
  activo = null; clearInterval(tHilo); tHilo = null;
  document.getElementById("lista").classList.remove("tiene-activa");
  document.getElementById("hilo").classList.remove("abierto");
}
function autoAlto(el){ el.style.height="auto"; el.style.height=Math.min(el.scrollHeight,140)+"px"; }
function teclaEnviar(e){ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); responder(); } }
function setMsg(t, err){ const m=document.getElementById("login-msg"); m.textContent=t; m.className = err?"err":"cargando"; }
let tToast=null;
function toast(t){ const el=document.getElementById("toast"); el.textContent=t; el.classList.add("ver"); clearTimeout(tToast); tToast=setTimeout(()=>el.classList.remove("ver"),2600); }

/* Encuentra el texto del mensaje sin importar cómo se llame el campo en el backend */
function campoTexto(m){
  if(!m || typeof m!=="object") return "";
  const c = m.texto ?? m.contenido ?? m.content ?? m.text ?? m.body ?? m.mensaje ?? m.msg ?? m.message;
  if(c != null && String(c).trim() !== "") return String(c);
  const meta = /^(rol|role|from|estado|status|telefono|phone|numero|id|_id|fecha|ts|timestamp|created_?at|updated_?at|hora|nombre|name|perfil|leido|no_?leidos|unread|tipo|type|direction|wa_?id|sid)$/i;
  for(const k in m){
    if(meta.test(k)) continue;
    const v = m[k];
    if(typeof v==="string" && v.trim()!=="") return v;
  }
  return "";
}

function decodeJWT(tok){
  try{
    const b = tok.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");
    const json = decodeURIComponent(atob(b).split("").map(c=>"%"+("00"+c.charCodeAt(0).toString(16)).slice(-2)).join(""));
    return JSON.parse(json);
  }catch(e){ return null; }
}
function fmtHora(v){
  if(!v) return "";
  let d = (typeof v==="number") ? new Date(v>1e12?v:v*1000) : new Date(v);
  if(isNaN(d)) return "";
  const hoy = new Date();
  const mismoDia = d.toDateString()===hoy.toDateString();
  return mismoDia
    ? d.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})
    : d.toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit"});
}
