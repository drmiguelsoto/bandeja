<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bandeja · Dr. Miguel Soto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
  :root{
    --negro:#030707; --taupe:#A19487; --crema:#F4F2F1;
    --taupe-suave:#EDE9E6; --linea:#E2DDD9; --texto:#2A2A28; --tenue:#8A847E;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:'Jost',sans-serif;color:var(--texto);background:var(--crema);
    -webkit-font-smoothing:antialiased;font-weight:300}
  h1,h2,h3,.serif{font-family:'Cormorant Garamond',serif;font-weight:500}
  button{font-family:'Jost',sans-serif;cursor:pointer}

  /* ---------- Login ---------- */
  #login{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:22px;background:var(--crema);padding:24px;text-align:center}
  .mono{width:64px;height:64px;border:1.5px solid var(--negro);border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;
    font-size:26px;letter-spacing:1px;color:var(--negro)}
  #login h1{font-size:34px;margin:0;color:var(--negro);letter-spacing:.5px}
  #login p{margin:0;color:var(--tenue);font-size:15px;max-width:320px}
  #err{color:#9b2c2c;font-size:14px;min-height:18px}

  /* ---------- App ---------- */
  #app[hidden]{display:none}
  #app{height:100%;display:flex;flex-direction:column}
  header.top{background:var(--negro);color:var(--crema);display:flex;align-items:center;
    gap:14px;padding:12px 20px;flex:0 0 auto}
  header.top .mono{width:34px;height:34px;border-color:var(--crema);color:var(--crema);font-size:15px}
  header.top .marca{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:1px}
  header.top .sep{color:var(--taupe)}
  header.top .quien{margin-left:auto;font-size:13px;color:var(--taupe);font-weight:300}

  .layout{flex:1;display:flex;min-height:0}
  aside.lista{width:340px;flex:0 0 auto;background:#fff;border-right:1px solid var(--linea);
    overflow-y:auto}
  .lista .cab{padding:14px 18px;border-bottom:1px solid var(--linea);
    font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--negro);
    display:flex;align-items:center;justify-content:space-between}
  .lista .cab small{font-family:'Jost';font-size:11px;color:var(--tenue);font-weight:400}
  .conv{padding:13px 18px;border-bottom:1px solid var(--linea);cursor:pointer;display:flex;gap:10px}
  .conv:hover{background:var(--crema)}
  .conv.activa{background:var(--taupe-suave)}
  .conv .info{flex:1;min-width:0}
  .conv .nom{font-weight:500;font-size:14px;color:var(--negro);display:flex;align-items:center;gap:6px}
  .conv .prev{font-size:12.5px;color:var(--tenue);white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;margin-top:2px}
  .conv .meta{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .conv .hora{font-size:11px;color:var(--tenue)}
  .badge{background:var(--negro);color:#fff;font-size:11px;min-width:19px;height:19px;
    border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}
  .pill{font-size:10px;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}
  .pill.humano{background:#d9edd9;color:#2f6b2f}
  .pill.bloqueado{background:#f0d9d9;color:#9b2c2c}
  .pill.bot{background:var(--taupe-suave);color:var(--taupe)}

  main.conv-panel{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--crema)}
  .vacio{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;color:var(--tenue);text-align:center;padding:24px}
  .vacio .mono{width:52px;height:52px;border-color:var(--linea);color:var(--taupe)}
  .conv-cab{flex:0 0 auto;background:#fff;border-bottom:1px solid var(--linea);
    padding:12px 20px;display:flex;align-items:center;gap:12px}
  .conv-cab .volver{display:none;background:none;border:none;font-size:20px;color:var(--negro)}
  .conv-cab .nombre{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--negro)}
  .conv-cab .tel{font-size:12px;color:var(--tenue)}
  .conv-cab .acciones{margin-left:auto}
  .btn-dev{background:var(--negro);color:var(--crema);border:none;border-radius:20px;
    padding:8px 16px;font-size:12.5px;letter-spacing:.3px}
  .btn-dev:hover{background:#1a1a1a}

  .hilo{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:74%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.45;
    white-space:pre-wrap;word-wrap:break-word}
  .msg .rot{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;opacity:.7}
  .msg.paciente{align-self:flex-start;background:#fff;border:1px solid var(--linea);
    border-bottom-left-radius:4px}
  .msg.michelle{align-self:flex-end;background:var(--taupe-suave);border-bottom-right-radius:4px}
  .msg.agente{align-self:flex-end;background:var(--negro);color:var(--crema);border-bottom-right-radius:4px}
  .msg.sistema{align-self:center;background:transparent;color:var(--tenue);font-size:12px;font-style:italic}
  .msg .hora{font-size:10px;opacity:.6;margin-top:4px;text-align:right}

  .responder{flex:0 0 auto;background:#fff;border-top:1px solid var(--linea);padding:12px 16px;
    display:flex;gap:10px;align-items:flex-end}
  .responder textarea{flex:1;resize:none;border:1px solid var(--linea);border-radius:12px;
    padding:10px 14px;font-family:'Jost';font-size:14px;max-height:120px;min-height:44px;color:var(--texto)}
  .responder textarea:focus{outline:none;border-color:var(--taupe)}
  .responder .enviar{background:var(--taupe);color:#fff;border:none;border-radius:12px;
    width:46px;height:44px;font-size:18px;flex:0 0 auto}
  .responder .enviar:hover{background:#8f8377}
  .responder .enviar:disabled{opacity:.5;cursor:default}
  .responder .aviso{width:100%;font-size:11.5px;color:var(--tenue);padding:2px 4px 8px}

  @media(max-width:720px){
    aside.lista{width:100%}
    #app.viendo aside.lista{display:none}
    #app:not(.viendo) main.conv-panel{display:none}
    .conv-cab .volver{display:block}
    .msg{max-width:86%}
  }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login">
  <div class="mono">MS</div>
  <h1>Bandeja</h1>
  <p>Atención de pacientes · Dr. Miguel Soto Universe. Ingrese con su cuenta del equipo.</p>
  <div id="gbtn"></div>
  <div id="err"></div>
</div>

<!-- ===== APP ===== -->
<div id="app" hidden>
  <header class="top">
    <div class="mono">MS</div>
    <span class="marca">Bandeja</span>
    <span class="sep">·</span>
    <span style="font-size:13px;color:var(--taupe)">Dr. Miguel Soto</span>
    <span class="quien" id="usuario"></span>
  </header>
  <div class="layout">
    <aside class="lista">
      <div class="cab">Conversaciones <small id="cont"></small></div>
      <div id="conversaciones"></div>
    </aside>
    <main class="conv-panel">
      <div class="vacio" id="vacio">
        <div class="mono">MS</div>
        <div class="serif" style="font-size:22px;color:var(--negro)">Seleccione una conversación</div>
        <div style="font-size:13px">Los mensajes se actualizan solos.</div>
      </div>
      <div id="conv-abierta" hidden style="flex:1;display:flex;flex-direction:column;min-height:0">
        <div class="conv-cab">
          <button class="volver" onclick="cerrarConv()">‹</button>
          <div>
            <div class="nombre" id="conv-nombre"></div>
            <div class="tel" id="conv-tel"></div>
          </div>
          <div class="acciones" id="conv-acciones"></div>
        </div>
        <div class="hilo" id="hilo"></div>
        <div class="responder">
          <div class="aviso">Su respuesta sale por WhatsApp con el número de la clínica y pausa a Michelle.</div>
          <textarea id="texto" placeholder="Escriba su respuesta…" rows="1"
            oninput="autosize(this)" onkeydown="teclas(event)"></textarea>
          <button class="enviar" id="btn-enviar" onclick="responder()">➤</button>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
// ⚙️ Dominio del backend (Railway). Cámbialo si tu dominio cambia.
const API = "https://chatbot-whatsapp-production-9bc5.up.railway.app";

let idToken = null, activo = null, pollConv = null, pollHilo = null;

// ---- Arranque: pedir el Client ID e iniciar Google Sign-In ----
window.addEventListener('load', async () => {
  try {
    const cfg = await fetch(API + "/inbox/config").then(r => r.json());
    if (!cfg.google_client_id) { mostrarErr("Falta configurar GOOGLE_CLIENT_ID en el servidor."); return; }
    const iniciar = () => {
      google.accounts.id.initialize({ client_id: cfg.google_client_id, callback: onLogin });
      google.accounts.id.renderButton(document.getElementById("gbtn"),
        { theme: "filled_black", size: "large", text: "signin_with", shape: "pill", locale: "es" });
    };
    if (window.google && google.accounts) iniciar();
    else { const t = setInterval(() => { if (window.google && google.accounts) { clearInterval(t); iniciar(); } }, 200); }
  } catch (e) { mostrarErr("No se pudo contactar al servidor. Revise el dominio del backend."); }
});

function mostrarErr(m){ document.getElementById("err").textContent = m; }

function onLogin(resp) {
  idToken = resp.credential;
  const p = JSON.parse(atob(idToken.split('.')[1]));
  document.getElementById("usuario").textContent = p.email || "";
  document.getElementById("login").hidden = true;
  document.getElementById("app").hidden = false;
  cargarConversaciones();
  pollConv = setInterval(cargarConversaciones, 5000);
}

function salirPorSesion(status) {
  clearInterval(pollConv); clearInterval(pollHilo);
  document.getElementById("app").hidden = true;
  document.getElementById("login").hidden = false;
  mostrarErr(status === 403
    ? "Su cuenta no está autorizada para la bandeja."
    : "Su sesión expiró. Ingrese de nuevo.");
}

async function api(path, opts = {}) {
  opts.headers = Object.assign({ "Authorization": "Bearer " + idToken }, opts.headers || {});
  const r = await fetch(API + path, opts);
  if (r.status === 401 || r.status === 403) { salirPorSesion(r.status); throw new Error("auth"); }
  return r.json();
}

// ---- Lista de conversaciones ----
function horaCorta(iso){
  const d = new Date(iso); const hoy = new Date();
  const mismo = d.toDateString() === hoy.toDateString();
  return mismo ? d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})
               : d.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit'});
}

async function cargarConversaciones() {
  let data; try { data = await api("/inbox/conversaciones"); } catch(e){ return; }
  const cont = document.getElementById("conversaciones");
  const convs = data.conversaciones || [];
  document.getElementById("cont").textContent = convs.length ? convs.length + " chats" : "";
  cont.innerHTML = "";
  if (!convs.length) {
    cont.innerHTML = '<div style="padding:20px;color:var(--tenue);font-size:13px">Aún no hay conversaciones.</div>';
    return;
  }
  for (const c of convs) {
    const div = document.createElement("div");
    div.className = "conv" + (c.telefono === activo ? " activa" : "");
    div.onclick = () => abrirConv(c.telefono);
    const nombre = c.nombre_perfil || c.telefono_completo || c.telefono;
    const pill = c.estado === 'humano' ? '<span class="pill humano">humano</span>'
               : c.estado === 'bloqueado' ? '<span class="pill bloqueado">bloqueado</span>' : '';
    const badge = (c.no_leidos > 0) ? `<span class="badge">${c.no_leidos}</span>` : '';
    const info = document.createElement("div"); info.className = "info";
    const nom = document.createElement("div"); nom.className = "nom";
    nom.textContent = nombre; nom.insertAdjacentHTML("beforeend", " " + pill);
    const prev = document.createElement("div"); prev.className = "prev";
    prev.textContent = c.ultimo_mensaje || "";
    info.appendChild(nom); info.appendChild(prev);
    const meta = document.createElement("div"); meta.className = "meta";
    meta.innerHTML = `<span class="hora">${horaCorta(c.ultimo_en)}</span>${badge}`;
    div.appendChild(info); div.appendChild(meta);
    cont.appendChild(div);
  }
}

// ---- Abrir una conversación ----
async function abrirConv(telefono) {
  activo = telefono;
  document.getElementById("vacio").hidden = true;
  document.getElementById("conv-abierta").hidden = false;
  document.getElementById("app").classList.add("viendo");
  clearInterval(pollHilo);
  await cargarHilo();
  pollHilo = setInterval(cargarHilo, 4000);
  cargarConversaciones();
}

function cerrarConv() {
  activo = null; clearInterval(pollHilo);
  document.getElementById("app").classList.remove("viendo");
  document.getElementById("conv-abierta").hidden = true;
  document.getElementById("vacio").hidden = false;
  cargarConversaciones();
}

async function cargarHilo() {
  if (!activo) return;
  let data; try { data = await api("/inbox/hilo/" + encodeURIComponent(activo)); } catch(e){ return; }
  const conv = data.conversacion || {};
  const nombre = conv.nombre_perfil || conv.telefono_completo || activo;
  document.getElementById("conv-nombre").textContent = nombre;
  document.getElementById("conv-tel").textContent = conv.telefono_completo || "";
  // botón devolver solo si está en modo humano
  const acc = document.getElementById("conv-acciones");
  acc.innerHTML = (conv.estado === 'humano')
    ? '<button class="btn-dev" onclick="devolver()">Devolver a Michelle</button>' : '';

  const hilo = document.getElementById("hilo");
  const alFinal = (hilo.scrollHeight - hilo.scrollTop - hilo.clientHeight) < 60;
  hilo.innerHTML = "";
  for (const m of (data.mensajes || [])) {
    const div = document.createElement("div");
    div.className = "msg " + (m.rol || "sistema");
    const rot = document.createElement("div"); rot.className = "rot";
    rot.textContent = m.rol === 'paciente' ? 'Paciente' : m.rol === 'michelle' ? 'Michelle'
                    : m.rol === 'agente' ? 'Equipo' : 'Sistema';
    const cuerpo = document.createElement("div"); cuerpo.textContent = m.contenido || "";
    const hr = document.createElement("div"); hr.className = "hora";
    hr.textContent = horaCorta(m.creado_en);
    if (m.rol !== 'sistema') div.appendChild(rot);
    div.appendChild(cuerpo); div.appendChild(hr);
    hilo.appendChild(div);
  }
  if (alFinal) hilo.scrollTop = hilo.scrollHeight;
}

// ---- Responder ----
function autosize(t){ t.style.height='auto'; t.style.height=Math.min(t.scrollHeight,120)+'px'; }
function teclas(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); responder(); } }

async function responder() {
  const ta = document.getElementById("texto");
  const texto = ta.value.trim();
  if (!texto || !activo) return;
  const btn = document.getElementById("btn-enviar");
  btn.disabled = true;
  try {
    await api("/inbox/responder", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ telefono: activo, texto })
    });
    ta.value = ""; autosize(ta);
    await cargarHilo();
  } catch (e) {
    alert("No se pudo enviar el mensaje. Intente de nuevo.");
  } finally { btn.disabled = false; }
}

async function devolver() {
  if (!activo) return;
  if (!confirm("¿Devolver esta conversación a Michelle?")) return;
  try {
    await api("/inbox/devolver", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ telefono: activo })
    });
    await cargarHilo();
  } catch (e) { alert("No se pudo devolver el control."); }
}
</script>
</body>
</html>
